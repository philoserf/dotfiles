version: "3"

tasks:
  default:
    cmds:
      - task: all

  all:
    desc: all
    cmds:
      - task: update
      - task: check
      - task: rubies
      - task: system

  update:
    desc: update
    cmds:
      - brew bundle install --global
  check:
    desc: check
    cmds:
      - brew bundle cleanup --global
  clean:
    desc: clean
    cmds:
      - brew bundle cleanup --global --force

  rubies:
    desc: rubies
    cmds:
      - rbenv update
      - rbenv update-rubies
      - bundle update --ruby --bundler
      - bundle clean --force
      - rbenv rehash

  system:
    desc: system
    cmds:
      - softwareupdate --install --all
