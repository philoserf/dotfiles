name: update
usage: update installed software and optionally cleanup too

tasks:
  apps:
    run:
      - task: update
      - task: upgrade
      - task: verify
  update:
    run:
      - command: brew update
  upgrade:
    run:
      - command: brew upgrade
      - command: brew cask upgrade
  verify:
    run:
      - command: brew bundle check --global
      - command: brew bundle cleanup --global

  check:
    run:
      - command: brew bundle dump --force
      - command: icdiff ~/.Brewfile Brewfile
      - command: rm Brewfile
  clean:
    run:
      - command: brew bundle cleanup --global --force
  install:
    run:
      - command: brew bundle install --global
  brewfile:
    run:
      - command: brew bundle dump --global --force

  rubies:
    run:
      - command: rbenv update
      - command: rbenv update-rubies
      - command: rbenv rehash
      - command: bundle update --ruby --bundler
      - command: bundle clean --force

  system:
    run:
      - command: softwareupdate --install --all

  all:
    run:
      - task: apps
      - task: rubies
      - task: system
