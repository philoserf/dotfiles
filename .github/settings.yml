repository:
  name: dotfiles
  description: Another yadm-managed personal dotfile collection
  homepage: https://philoserf.github.io/dotfiles
  topics: yadm, dotfiles
  private: false
  has_issues: false
  has_projects: false
  has_wiki: false
  has_downloads: false
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: true
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

labels:
  - name: bug
    color: "#CC0000"
    description: old brokenness
  - name: feature
    color: "#336699"
    description: new hotness

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        dismissal_restrictions:
          users:
            - philoserf
      required_status_checks:
        strict: true
        contexts: []
      enforce_admins: null
      restrictions:
        apps: []
        users: []
        teams: []
